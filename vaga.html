<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto 2 yooo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../projeto2matheus/vaga.css" />
  </head>
  <body>
    <header>
      <h1>Trabalhe conosco</h1>
    </header>
    <div class="container">
      <div class="row">
        <div class="col">
          <form>
            <div class="mb-3">
              <label for="exampleInputPassword1" class="form-label text-light"
                >Nome</label
              >
              <input
                required
                type="text"
                class="form-control"
                id="nome"
                placeholder="Insira seu nome..."
              />
            </div>
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label text-light"
                >Email</label
              >
              <input
                required
                type="email"
                class="form-control"
                id="email"
                placeholder="Insira seu email..."
              />
            </div>
            <div class="mb-3">
              <label for="form-select" class="text-light"
                >Área de interesse</label
              >
              <select required class="form-select">
                <option selected disabled value="">Selecione...</option>
                <option value="dev">Desenvolvimento</option>
                <option value="des">Design</option>
                <option value="sup">Suporte</option>
                <option value="com">Comercial</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="form-select" class="text-light"
                >Nível de experiência</label
              >
              <select class="form-select">
                <option value="jun">Júnior</option>
                <option value="pln">Pleno</option>
                <option value="sen">Sênior</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="basic-url" class="form-label text-light"
                >Link do currículo</label
              >
              <div class="input-group">
                <span class="input-group-text" id="basic-addon3">https://</span>
                <input
                  required
                  type="text"
                  class="form-control"
                  id="basic-url"
                  placeholder="Insira um link (Exemplo: Google Drive)"
                />
              </div>
            </div>
            <div class="mb-3">
              <label for="form-select" class="text-light"
                >Disponibilidade de horário</label
              >
              <select class="form-select">
                <option value="mnh">Manhã</option>
                <option value="trd">Tarde</option>
                <option value="nte">Noite</option>
                <option value="tde">Tudo</option>
              </select>
            </div>
            <div class="input-group">
              <span class="input-group-text">Carta de apresentação</span>
              <textarea
                class="form-control"
                rows="3"
                placeholder="Mínimo 3 linhas"
              ></textarea>
            </div>

            <br />

            <button type="submit" class="btn btn-primary">Enviar</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
